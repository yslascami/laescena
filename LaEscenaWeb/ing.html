<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <title>Ingresar - La Escena</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        header {
            background: rgb(129, 52, 58); 
            color: white;
            padding: 20px;
            margin: -40px -40px 30px -40px;
            border-radius: 8px 8px 0 0;
        }

        h2 {
            margin: 0;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; }
        

        button {
            width: 100%;
            padding: 12px;
            background-color: rgb(173, 102, 108); 
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: rgb(129, 52, 58);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-links a {
            color: rgb(107, 91, 92);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
    </head>
    <body>

    <div class="login-card">
        <header>
            <h2>La Escena</h2>
        </header>
        
        <form action="procesar_login.php" method="POST">
            <div class="form-group">
                <label for="usuario">Usuario o Correo</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit">Entrar</button>
        </form>

        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            <p><a href="index.html">Volver al Inicio</a></p>
        </div>
    </div>

    </body>
</html>
